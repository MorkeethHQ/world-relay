<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="100%" x2="0%" y2="60%">
      <stop offset="0%" stop-color="#0a0a0a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect x="20" y="20" width="560" height="360" rx="12" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <!-- Pyramid silhouette -->
  <polygon points="300,80 220,220 380,220" fill="#0f3460" opacity="0.6"/>
  <!-- Queue dots -->
  <circle cx="240" cy="260" r="6" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="260" cy="265" r="6" fill="#8b5cf6" opacity="0.7"/>
  <circle cx="280" cy="262" r="6" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="300" cy="268" r="6" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="320" cy="264" r="6" fill="#8b5cf6" opacity="0.7"/>
  <circle cx="340" cy="260" r="6" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="360" cy="266" r="6" fill="#8b5cf6" opacity="0.6"/>
  <!-- Gradient overlay for realism -->
  <rect x="20" y="20" width="560" height="360" rx="12" fill="url(#overlay)"/>
  <!-- Title -->
  <text x="300" y="310" text-anchor="middle" fill="#e0e0e0" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Louvre Queue - 35 people</text>
  <text x="300" y="340" text-anchor="middle" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="14">~20 min wait</text>
  <!-- Camera icon badge -->
  <rect x="240" y="355" width="120" height="24" rx="12" fill="#8b5cf6" opacity="0.2"/>
  <text x="300" y="371" text-anchor="middle" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="11" font-weight="500">VERIFIED PHOTO</text>
</svg>
