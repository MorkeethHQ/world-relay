<svg width="345" height="240" viewBox="0 0 345 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Light background -->
  <rect width="345" height="240" rx="12" fill="#FAFAFA"/>
  <rect width="345" height="240" rx="12" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Mini relay icon -->
  <g transform="translate(24, 28)">
    <path d="M-8 3L0 7L8 3L0 -1Z" fill="#D1D1D1" stroke="#BFBFBF" stroke-width="0.5" transform="translate(12,12)"/>
    <path d="M-8 0L0 4L8 0L0 -4Z" fill="#999" stroke="#888" stroke-width="0.5" transform="translate(12,12)"/>
    <path d="M-8 -3L0 1L8 -3L0 -7Z" fill="#1a1a1a" stroke="#333" stroke-width="0.5" transform="translate(12,12)"/>
    <circle cx="12" cy="4" r="2.5" fill="#22c55e"/>
  </g>

  <!-- Title -->
  <text x="52" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" letter-spacing="1" fill="#1a1a1a">RELAY FAVOURS</text>

  <!-- Tagline -->
  <text x="24" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#999999">When AI hits a wall, RELAY finds a verified human.</text>

  <!-- Flow diagram -->
  <line x1="55" y1="100" x2="290" y2="100" stroke="#E5E5E5" stroke-width="1.5"/>

  <!-- Step 1 -->
  <circle cx="55" cy="100" r="6" fill="#3b82f6"/>
  <text x="55" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#1a1a1a">Post</text>
  <text x="55" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="6.5" fill="#999999">USDC escrow</text>

  <!-- Step 2 -->
  <circle cx="133" cy="100" r="6" fill="#f59e0b"/>
  <text x="133" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#1a1a1a">Claim</text>
  <text x="133" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="6.5" fill="#999999">World ID</text>

  <!-- Step 3 -->
  <circle cx="211" cy="100" r="6" fill="#8b5cf6"/>
  <text x="211" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#1a1a1a">Prove</text>
  <text x="211" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="6.5" fill="#999999">AI verified</text>

  <!-- Step 4 -->
  <circle cx="290" cy="100" r="6" fill="#22c55e"/>
  <text x="290" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#1a1a1a">Paid</text>
  <text x="290" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="6.5" fill="#999999">On-chain</text>

  <!-- Bottom zone stays clear (below y=146) -->
</svg>
